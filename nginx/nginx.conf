server {
    listen 80;
    listen [::]:80;
    .........;  # 此处省略，自填
}

# ============================================================
# Sakura_embyboss Nginx 示例
# ============================================================
# 这个示例包含两项可选能力：
#
# 1. 线路上报
#    用户播放时，nginx 通过 mirror 把当前请求对应的“线路信息”异步上报给
#    bot 的 /emby/line_report，bot 再结合 emby_whitelist_line 判断该用户
#    是否有权限使用当前线路。
#
# 2. 播放列表拦截
#    用户尝试创建/修改/删除播放列表时，请求不会继续交给 Emby，而是由 nginx
#    内部转发到 bot 的 /emby/ban_playlist，由 bot 执行封禁与通知逻辑。
#
# ------------------------------------------------------------
# 如果你要在自己的环境启用，请重点修改下面这些地方：
#
# A. Emby 后端地址
#    - upstream emby_backend 里的 server 127.0.0.1:8096;
#    - 如果 Emby 不在本机，请改成实际地址，例如 192.168.1.10:8096。
#
# B. Bot API 地址
#    - upstream bot_api_backend 里的 server 127.0.0.1:8838;
#    - 如果 bot 不在本机，请改成实际地址。
#
# C. 当前线路的域名
#    - server_name localhost;
#    - 请改成用户实际访问 этой条线路时使用的域名，例如 media-vip.example.com。
#
# D. 当前线路的标识名
#    - set $line_name "localhost";
#    - 这是给 bot 用的“线路名”，建议每条线路都不一样，例如：
#      "line_a" / "line_b" / "vip" / "internal"
#
# E. Bot 配置文件
#    - 仅改 nginx 不够，你还需要在 bot 的 config.json 中配置 emby_whitelist_line。
#    - 这个值应能和当前线路上报到 bot 的 host / line 对上。
#    - 例如本 server 块的 server_name 是 media-vip.example.com，
#      那么 emby_whitelist_line 建议配置为 media-vip.example.com。
#
# F. 如果你有多条线路
#    - 通常做法是复制整段 server { ... }，每条线路一份；
#    - 然后分别修改：
#      1) listen / ssl
#      2) server_name
#      3) set $line_name
#      4) 日志、证书等
#    - bot 会根据每个 server 块上报的 line / host 区分线路。
#
# ------------------------------------------------------------
# 如果你只想启用“线路上报”，至少保留：
# - /emby/Sessions/Playing 里的 mirror 配置
# - location = /internal_line_report
#
# 如果你只想启用“播放列表拦截”，至少保留：
# - location @ban_playlist_block
# - 所有 /emby/Playlists... 相关 location
#
# 如果两项都不想启用，就删掉对应 location，只保留普通反代 location / 即可。
upstream emby_backend {
    # Emby 服务地址
    server 127.0.0.1:8096;
}

upstream bot_api_backend {
    # Sakura_embyboss Web API 地址
    server 127.0.0.1:8838;
}
server {
    # 示例中使用 8080。
    # 如果你是正式环境，通常会改成 443 ssl，并配置证书。
    listen 8080;

    # 当前这条线路对应的访问域名。
    # bot 在线路上报时会收到 host=$server_name。
    server_name localhost;

    # 当前 server 块对应的“线路名称”。
    # 如果你复制多个 server 块做多线路，请确保每条线路的值不同。
    set $line_name "localhost";

    # 可按需修改日志路径。
    access_log /var/log/nginx/emby_local_access.log;
    error_log  /var/log/nginx/emby_local_error.log info;

    # ==================== 通用反代 ====================
    # 除了下面单独处理的接口外，其余 Emby 请求都正常转发给 Emby。
    location / {
        proxy_pass http://emby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ==================== 线路上报 ====================
    # 这里只拦截播放相关请求。
    #
    # 工作方式：
    # 1) 原始播放请求照常转发给 Emby；
    # 2) nginx 额外发一个 mirror 子请求到 /internal_line_report；
    # 3) /internal_line_report 再把 line / host / 请求头转发到 bot 的 /emby/line_report。
    #
    # 如果你不想启用“线路上报”，可以去掉下面两行：
    #   mirror /internal_line_report;
    #   mirror_request_body off;
    location ~* ^/emby/Sessions/Playing {
        mirror /internal_line_report;
        mirror_request_body off;

        proxy_pass http://emby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # mirror 专用 internal location。
    # 用户不会直接访问到这里，只会被 nginx 内部子请求调用。
    location = /internal_line_report {
        internal;

        # bot 的 /emby/line_report 使用 GET，不需要请求体。
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # 把原始请求 URI 带给 bot。
        # bot 会从 URI 中解析 userId、deviceId、SessionId、token 等线索。
        proxy_set_header X-Original-URI $request_uri;

        # 把 Emby 常见认证头一并转发给 bot，便于 bot 识别当前用户。
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
        proxy_set_header X-Emby-Token $http_x_emby_token;

        # 真正的线路上报接口。
        # 这里会向 bot 上报：
        # - line=$line_name   当前线路名称
        # - host=$server_name 当前线路域名
        #
        # 如果你的 bot_api_backend 地址变了，只需要改 upstream，不需要改这里。
        proxy_pass http://bot_api_backend/emby/line_report?line=$line_name&host=$server_name;
    }

    # ==================== 播放列表拦截 ====================
    # 这是播放列表拦截的内部跳转终点。
    #
    # 工作方式：
    # 1) Playlists 相关 location 命中敏感方法时先 return 418；
    # 2) error_page 418 = @ban_playlist_block;
    # 3) nginx 内部跳转到这里；
    # 4) 再转发给 bot 的 /emby/ban_playlist。
    #
    # 这样做的好处是：
    # - 客户端不会被 301 重定向到一个可能不可访问的地址；
    # - 封禁逻辑只在服务器内部发生。
    location @ban_playlist_block {
        internal;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;

        # 这里依赖请求里自带的 userId 参数。
        # bot 会把 eid=$arg_userId 当成 Emby 用户标识来处理。
        proxy_pass http://bot_api_backend/emby/ban_playlist?eid=$arg_userId;
    }

    # ==================== 播放列表拦截 ====================
    # 如果你不想启用“播放列表拦截”，可以删掉下面所有 /emby/Playlists... 相关 location。

    # 创建新的播放列表
    location ~* ^/emby/Playlists$ {
        # 命中 return 418 后，内部跳转到 @ban_playlist_block
        error_page 418 = @ban_playlist_block;

        if ($request_method = POST) {
            return 418;
        }

        proxy_pass http://emby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 添加条目到播放列表，同时把 GET 查看结果伪装成空列表。
    # 如果你只想拦截“添加”，不想屏蔽“查看”，可以删掉 GET 分支。
    location ~ ^/emby/Playlists/(\w+)/Items$ {
        default_type application/json;
        error_page 418 = @ban_playlist_block;

        if ($request_method = POST) {
            return 418;
        }

        if ($request_method = GET) {
            return 200 '{"Items":[],"TotalRecordCount":0}';
        }

        proxy_pass http://emby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 删除播放列表条目
    location ~ ^/emby/Playlists/(\w+)/Items/(\w+)$ {
        error_page 418 = @ban_playlist_block;

        if ($request_method = DELETE) {
            return 418;
        }

        proxy_pass http://emby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 移动播放列表条目
    location ~ ^/emby/Playlists/(\w+)/Items/(\w+)/Move/(\w+)$ {
        error_page 418 = @ban_playlist_block;

        if ($request_method = POST) {
            return 418;
        }

        proxy_pass http://emby_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
