server {
    listen 80;
    listen [::]:80;
    .........;  # 此处省略，自填
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    .........; # 此处省略，自填

    # ==================== 线路标识 ====================
    # 在每条线路的 server 块中设置线路名称，用于线路权限检查
    # 不同线路的 server 块设置不同的 $line_name，如 "line_a", "line_b", "vip_line"
    set $line_name "default";

    # ==================== 线路权限检查（nginx mirror 方式） ====================
    # 当用户发起播放/认证请求时，nginx 通过 mirror 异步通知 Bot API 当前用户使用的线路
    # mirror 不阻塞原始请求，不影响正常播放体验
    # 请将 bot-api:8838 替换为你的 Bot API 地址

    # 播放开始/进度/停止 相关请求
    location ~* ^/emby/Sessions/Playing {
        mirror /internal_line_report;
        mirror_request_body off;
        proxy_pass http://emby_backend;  # 替换为你的 Emby 后端地址
        # ... 其他 proxy 配置
    }

    # 用户认证请求
    location ~* ^/emby/Users/AuthenticateByName {
        mirror /internal_line_report;
        mirror_request_body off;
        proxy_pass http://emby_backend;  # 替换为你的 Emby 后端地址
        # ... 其他 proxy 配置
    }

    # 内部线路上报 location（不要修改此块，仅修改 proxy_pass 地址）
    location = /internal_line_report {
        internal;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
        proxy_set_header X-Emby-Token $http_x_emby_token;
        proxy_pass http://bot-api:8838/emby/line_report?line=$line_name&userId=$arg_userId&host=$server_name&deviceId=$arg_X_Emby_Device_Id;
        # 请将 bot-api:8838 替换为你的 Bot API 实际地址
    }

    # ==================== 播放列表拦截 ====================
    # 请将以下 301重定向后的地址 改为你的Bot的Api地址+端口/emby/ban_playlist
    # 特别提醒，如果你服的地址是强制https，请为api套上https，否则会出现无法访问的情况（前后协议需要一致）
    # 以下示例填写为 我的测试api  https://api.susuyyds.xyz 转发的是机器人所在的 ip:8838 请按照自己的内容替换

    # 创建新的播放列表
    location ~* ^/emby/Playlists {
    if ($request_method = POST) {
        set $userId $arg_userId;
        return 301 https://api.susuyyds.xyz/emby/ban_playlist?eid=$userId; # 修改此处地址
    }
    return 403;
    }

    # 添加条目到播放列表
    location ~ ^/emby/Playlists/(\w+)/Items$ {
    if ($request_method = POST) {
        set $userId $arg_userId;
        return 301 https://api.susuyyds.xyz/emby/ban_playlist?eid=$userId;
    }
    return 403;
    }

    # 删除条目
    location ~ ^/emby/Playlists/(\w+)/Items/(\w+)$ {
    if ($request_method = DELETE) {
        set $userId $arg_userId;
        return 301 https://api.susuyyds.xyz/emby/ban_playlist?eid=$userId;
    }
    return 403;
    }

    # 移动条目
    location ~ ^/emby/Playlists/(\w+)/Items/(\w+)/Move/(\w+)$ {
    if ($request_method = POST) {
        set $userId $arg_userId;
        return 301 https://api.susuyyds.xyz/emby/ban_playlist?eid=$userId;
    }
    return 403;
    }

    # 获取播放列表
    location ~ ^/emby/Playlists/(\w+)/Items$ {
    if ($request_method = GET) {
        return 200 '{"Items":[],"TotalRecordCount":0}';
    }
    return 403;
    }
}
